{% extends "base_generic.html" %}

{% block title %}{% if object %}Upravit uživatele{% else %}Přidat uživatele{% endif %}{% endblock %}

{% block content %}
<h1>{% if object %}Upravit uživatele{% else %}Přidat uživatele{% endif %}</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Uložit</button>
</form>

<a href="{% url 'product_list' %}">Zpět na seznam produktů</a>
{% endblock %}
